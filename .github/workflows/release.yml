name: Release

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust caching
        uses: Swatinem/rust-cache@v2

      - name: Install Protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Install cross
        run: cargo install cross

      - name: Build x86_64-musl
        run: cross build --release --target x86_64-unknown-linux-musl

      - name: Build aarch64-musl
        run: cross build --release --target aarch64-unknown-linux-musl

      - name: Create release artifacts
        run: |
          mkdir -p release_artifacts
          APP=pact-sse-plugin
          for target in x86_64-unknown-linux-musl aarch64-unknown-linux-musl; do
            arch_name=$(echo "$target" | sed 's/.*-//' | sed 's/-.*//')
            cp "target/${target}/release/${APP}" "release_artifacts/${APP}-linux-${arch_name}-musl"
            gzip -k "release_artifacts/${APP}-linux-${arch_name}-musl"
            sha256sum "release_artifacts/${APP}-linux-${arch_name}-musl.gz" > "release_artifacts/${APP}-linux-${arch_name}-musl.gz.sha256"
          done
          cp pact-plugin.json release_artifacts/
          sha256sum release_artifacts/pact-plugin.json > release_artifacts/pact-plugin.json.sha256

      - name: Upload Release Assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: release_artifacts/*
          file_glob: true
          tag: ${{ github.ref }}

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust caching
        uses: Swatinem/rust-cache@v2

      - name: Install Protoc
        run: choco install protoc -y

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Create release artifacts
        shell: bash
        run: |
          mkdir -p release_artifacts
          cp target/x86_64-pc-windows-msvc/release/pact-sse-plugin.exe release_artifacts/pact-sse-plugin-windows-x86_64.exe
          cp pact-plugin.json release_artifacts/
          sha256sum release_artifacts/pact-plugin.json > release_artifacts/pact-plugin.json.sha256

      - name: Upload Release Assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: release_artifacts/*
          file_glob: true
          tag: ${{ github.ref }}

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Rust caching
        uses: Swatinem/rust-cache@v2

      - name: Install Protoc
        run: brew install protobuf

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create release artifacts
        run: |
          mkdir -p release_artifacts
          cp target/x86_64-apple-darwin/release/pact-sse-plugin release_artifacts/pact-sse-plugin-osx-x86_64
          cp target/aarch64-apple-darwin/release/pact-sse-plugin release_artifacts/pact-sse-plugin-osx-aarch64
          gzip -k release_artifacts/pact-sse-plugin-osx-x86_64
          gzip -k release_artifacts/pact-sse-plugin-osx-aarch64
          sha256sum release_artifacts/pact-sse-plugin-osx-x86_64.gz > release_artifacts/pact-sse-plugin-osx-x86_64.gz.sha256
          sha256sum release_artifacts/pact-sse-plugin-osx-aarch64.gz > release_artifacts/pact-sse-plugin-osx-aarch64.gz.sha256
          cp pact-plugin.json release_artifacts/
          sha256sum release_artifacts/pact-plugin.json > release_artifacts/pact-plugin.json.sha256

      - name: Upload Release Assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: release_artifacts/*
          file_glob: true
          tag: ${{ github.ref }}
